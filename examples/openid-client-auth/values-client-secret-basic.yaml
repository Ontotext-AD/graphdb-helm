# client_secret_basic — Client ID and secret sent as an HTTP Basic Authentication header.
#
# The most widely supported method. Use when the identity provider supports
# Basic auth at the token endpoint.

configuration:
  properties:
    graphdb.auth.openid.proxy: "true"
    graphdb.auth.openid.client.auth.type: "client_secret_basic"
  secretProperties:
    graphdb.auth.openid.client_secret: "your-client-secret"

security:
  enabled: true