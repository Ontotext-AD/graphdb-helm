# client_secret_jwt — A short-lived JWT signed with the client secret, sent as
# a client_assertion parameter. More secure than sending the secret directly.
#
# Default signing algorithm is HS256. Override with
# graphdb.auth.openid.client.auth.signature_alg if the identity provider
# requires a different algorithm.

configuration:
  properties:
    graphdb.auth.openid.proxy: "true"
    graphdb.auth.openid.client.auth.type: "client_secret_jwt"
    # graphdb.auth.openid.client.auth.signature_alg: "HS256"  # default HS256
  secretProperties:
    graphdb.auth.openid.client_secret: "your-client-secret"

security:
  enabled: true