# client_secret_post — Client secret sent in the token request body.
#
# Use when the identity provider does not support HTTP Basic auth at the
# token endpoint.

configuration:
  properties:
    graphdb.auth.openid.proxy: "true"
    graphdb.auth.openid.client.auth.type: "client_secret_post"
  secretProperties:
    graphdb.auth.openid.client_secret: "your-client-secret"

security:
  enabled: true