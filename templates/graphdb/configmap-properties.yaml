apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "graphdb.fullname.configmap.properties" . }}
  namespace: {{ include "graphdb.namespace" . }}
  labels:
    {{- include "graphdb.labels" . | nindent 4 }}
  {{- with .Values.annotations }}
  annotations:
    {{- tpl (toYaml .) $ | nindent 4 }}
  {{- end }}
data:
  graphdb.properties: |-
    ##### GraphDB configurations #####
    # See https://graphdb.ontotext.com/documentation/ for supported properties
    graphdb.connector.port={{ .Values.containerPorts.http }}
    graphdb.append.request.id.headers=true
    graphdb.workbench.importDirectory=/opt/graphdb/home/graphdb-import
    graphdb.ontop.jdbc.path=/opt/graphdb/home/jdbc-driver
    {{- if eq (int .Values.replicas) 1}}
    graphdb.external-url={{ include "graphdb.external-url" . }}
    {{- end }}
    {{- with .Values.cluster.config.tls }}
    {{- if ne .mode "NONE" }}
    graphdb.raft.security.mode={{ .mode  }}
    {{- if .keystore.secretName}}
    graphdb.raft.security.keystoreFile=/opt/graphdb/home/conf/keystore.jks
    graphdb.raft.security.keyAlias={{ .keystore.keyAlias }}
    {{- end }}
    {{- if .truststore.secretName}}
    graphdb.raft.security.truststoreFile=/opt/graphdb/home/conf/truststore.jks
    {{- end }}
    {{- if .privateKey.secretName }}
    graphdb.raft.security.certificateKeyFile=/opt/graphdb/home/conf/privatekey.pem
    {{- end }}
    {{- if .certificate.secretName }}
    graphdb.raft.security.certificateFile=/opt/graphdb/home/conf/certificate.pem
    {{- end }}
    {{- if .certificateChain.secretName }}
    graphdb.raft.security.certificateChainFile=/opt/graphdb/home/conf/certificatechain.pem
    {{- end }}
    {{- end }}
    {{- end }}
    {{- if .Values.configuration.properties }}
    ##### Overrides from values.yaml #####
    {{- range $key, $val := .Values.configuration.properties -}}
    {{- if ne $val nil }}
    {{ $key }}={{ tpl ($val | toString) $ | quote }}
    {{- end }}
    {{- end -}}
    {{- end -}}
