apiVersion: v1
kind: Secret
metadata:
  name: {{ include "graphdb.fullname.secret.properties" . }}
  namespace: {{ include "graphdb.namespace" . }}
  labels:
    {{- include "graphdb.labels" . | nindent 4 }}
  {{- with .Values.annotations }}
  annotations:
    {{- tpl (toYaml .) $ | nindent 4 }}
  {{- end }}
type: Opaque
stringData:
  graphdb-secrets.properties: |-
    ##### GraphDB sensitive configurations #####
    {{- if and (gt (int .Values.replicas) 1) (not .Values.cluster.token.existingSecret) }}
    graphdb.auth.token.secret={{ .Values.cluster.token.secret | quote }}
    {{- end }}
    {{- if .Values.cluster.config.tls.enabled }}
    graphdb.raft.security.keystoreFile=/opt/graphdb/home/conf/keystore.jks
    graphdb.raft.security.truststoreFile=/opt/graphdb/home/conf/truststore.jks
    {{- with .Values.cluster.config.tls }}
    {{- $keystoreSecret := lookup "v1" "Secret" $.Release.Namespace .keystore.secretName }}
    {{- $keystorePass := index $keystoreSecret.data (quote .keystore.keystorePasswordKey) | toString }}
    graphdb.raft.security.keystorePass={{ $keystorePass | b64dec | quote }}
    {{- $truststoreSecret := lookup "v1" "Secret" $.Release.Namespace .trustStore.secretName }}
    {{- $truststorePass := index $truststoreSecret.data (quote .trustStore.truststorePasswordKey | toString) }}
    graphdb.raft.security.truststorePass={{ $truststorePass | b64dec | quote }}
    {{- end }}
    {{- end }}
    {{- if .Values.configuration.secretProperties }}
    ##### Secrets overrides from values.yaml #####
    {{- range $key, $val := .Values.configuration.secretProperties -}}
    {{- if ne $val nil }}
    {{ $key }}={{ tpl ($val | toString) $ | quote }}
    {{- end }}
    {{- end -}}
    {{- end -}}
